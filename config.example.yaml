# mirrord configuration
#
# All mirrors listed below are publicly accessible — no special
# access or registration required.  See comments for tuning.

server:
  host: "0.0.0.0"
  port: 8080

# Optional: GeoIP database path for download geolocation stats.
# If not set, mirrord checks common locations:
#   /usr/share/GeoIP/GeoLite2-Country.mmdb
#   /var/lib/GeoIP/GeoLite2-Country.mmdb
# Also supported via MIRRORD_GEOIP_DB environment variable.
# Requires: pip install mirrord[geoip]
# geoip_db: "/path/to/GeoLite2-Country.mmdb"

sync:
  # How often to run sync jobs (in seconds).  6–24 h recommended
  # for public mirrors — be kind to upstream bandwidth.
  interval: 21600
  # Directory to store lock files
  lock_dir: "/tmp/mirrord"
  # Path to the SQLite database used for download and sync stats.
  # Defaults to "<lock_dir>/mirrord.db" if not set.
  # database_path: "/var/lib/mirrord/mirrord.db"
  # Networks allowed to assert the real client IP via X-Forwarded-For,
  # X-Real-IP, or Forwarded headers. Requests from other addresses are
  # treated as the client itself and these headers are ignored (prevents
  # IP spoofing). Defaults to loopback + private ranges. Set this to your
  # reverse proxy's address(es) so GeoIP geocodes the visitor, not the proxy.
  # trusted_proxies:
  #   - "172.20.0.0/16"

plugins:
  # ── Arch Linux (Tier 2 public mirror) ──────────────────────────
  - type: arch_rsync
    enabled: true
    name: "Arch Linux"
    slug: "archlinux"
    description: |
      Arch Linux package mirror (core, extra, community, multilib).
      Public Tier‑2 rsync — no registration needed.
      ~80–100 GiB with sources excluded.
    config:
      target: "/data/archlinux"
      source_url: "rsync://mirrors.kernel.org/archlinux"
      tls: false         # public mirrors use plain rsync, not rsync-ssl
      bwlimit: 4096      # KiB/s — leave 0 for unlimited
      excludes:
        - "*.links.tar.gz*"
        - "/other"
        - "/sources"

  # ── Debian (ftpsync — public‑mirror grade) ───────────────────
  - type: ftpsync
    enabled: true
    name: "Debian"
    slug: "debian"
    description: |
      Debian archive mirror via ftpsync (two‑stage rsync).
      Suitable for use as a public mirror — see
      https://www.debian.org/mirror/ftpmirror.
      Requires `ftpsync` on the host (apt install ftpsync).
    config:
      target: "/data/debian"
      host: "ftp.debian.org"
      rsync_path: "debian"
      archs: "amd64"
      include_source: false
      bwlimit: 4096

  # ── Debian (rsync — lightweight subset) ─────────────────────────
  - type: arch_rsync
    enabled: false
    name: "Debian (subset)"
    slug: "debian-subset"
    description: |
      Lightweight Debian mirror via plain rsync — useful when you only
      need a subset (e.g. specific architectures or excludes) and don't
      need public-mirror grade.  Prefer the ftpsync entry above for
      anything that will be served publicly.
    config:
      target: "/data/debian-subset"
      source_url: "rsync://ftp.debian.org/debian"
      tls: false
      bwlimit: 4096
      excludes:
        - "*.links.tar.gz*"
        - "/project"
        - "/tools"
        - "/ls-lR.gz"

  # ── Local directory (no sync) ────────────────────────────────
  - type: local_dir
    enabled: true
    name: "Static Assets"
    slug: "static-assets"
    description: |
      Serves an existing local directory as-is — no remote sync.
      Useful for NFS mounts, externally managed data, or manually
      populated trees.
    config:
      target: "/data/static-assets"

  # Add more mirrors below by copying a block above and adjusting
  # type, name, slug, and config.
  #
  # Supported plugin types:
  #   arch_rsync  — rsync-based mirror (Arch, Debian, Ubuntu, …)
  #   ftpsync     — public-mirror-grade Debian sync (two-stage rsync)
  #   local_dir   — serves an existing local directory (no sync)
